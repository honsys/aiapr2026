<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gem Travel Log</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;height:100dvh}
  header{padding:.75rem 1rem;background:#1e293b;display:flex;align-items:center;gap:.6rem;flex-shrink:0}
  header h1{font-size:1rem;font-weight:700;flex:1}
  #gps{font-size:.7rem;color:#94a3b8;text-align:right}
  #map{flex:1;min-height:0}
  #panel{padding:.75rem;display:flex;flex-direction:column;gap:.6rem;background:#0f172a;flex-shrink:0}
  #status{font-size:.8rem;color:#94a3b8;min-height:1.1em}
  .row{display:flex;gap:.5rem}
  button{flex:1;padding:.7rem .5rem;border:none;border-radius:.5rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s}
  button:disabled{opacity:.35;cursor:not-allowed}
  #btn-rec{background:#ef4444;color:#fff}
  #btn-rec.on{background:#7f1d1d;animation:pulse 1s infinite}
  #btn-save{background:#22c55e;color:#fff}
  #btn-export{background:#3b82f6;color:#fff}
  #log{list-style:none;max-height:18vh;overflow-y:auto;display:flex;flex-direction:column;gap:.4rem}
  #log li{background:#1e293b;border-radius:.4rem;padding:.5rem .7rem;font-size:.78rem}
  #log li b{color:#f8fafc}
  .tag{background:#334155;border-radius:.2rem;padding:.05rem .35rem;margin:.1rem .1rem 0 0;display:inline-block;font-size:.7rem}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🗺</span>
  <h1>Gem Travel Log</h1>
  <div id="gps">GPS: waiting…</div>
</header>

<div id="map"></div>

<div id="panel">
  <div id="status">Ready — press Record and speak your travel note.</div>
  <div class="row">
    <button id="btn-rec">🎙 Record</button>
    <button id="btn-save" disabled>💾 Save</button>
    <button id="btn-export">⬇ GeoJSON</button>
  </div>
  <ul id="log"></ul>
</div>

<script>
// ── state ────────────────────────────────────────────────────────────────────
let features = [], lat = null, lon = null, transcript = "", recog = null;

// ── GPS ──────────────────────────────────────────────────────────────────────
navigator.geolocation && navigator.geolocation.watchPosition(
  p => {
    lat = p.coords.latitude; lon = p.coords.longitude;
    document.getElementById("gps").textContent =
      `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  },
  () => status("⚠ GPS denied — enable location permission"),
  { enableHighAccuracy: true }
);

// ── Speech (Web Speech API — Chrome/Edge/Safari/Android/iOS) ─────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recog = new SR();
  recog.continuous = false; recog.interimResults = false; recog.lang = "en-US";
  recog.onresult = e => {
    transcript = e.results[0][0].transcript;
    status(`🎙 Heard: "${transcript}"`);
    document.getElementById("btn-save").disabled = false;
  };
  recog.onerror = e => status("⚠ Speech error: " + e.error);
  recog.onend   = () => document.getElementById("btn-rec").classList.remove("on");
} else {
  status("⚠ Speech API unavailable — use Chrome/Edge/Safari");
}

// ── Map ───────────────────────────────────────────────────────────────────────
function renderMap() {
  const lats = features.map(f => f.geometry.coordinates[1]);
  const lons = features.map(f => f.geometry.coordinates[0]);
  Plotly.react("map", [{
    type:"scattermapbox", mode:"markers+text",
    lat: lats, lon: lons,
    text: features.map(f => f.properties.title),
    hovertext: features.map(f =>
      `<b>${f.properties.title}</b><br>${f.properties.note}<br>${f.properties.timestamp}`),
    hoverinfo:"text",
    marker:{ size:13, color:"#ef4444" },
    textposition:"top center", textfont:{ color:"#fff", size:10 }
  }], {
    mapbox:{ style:"open-street-map", zoom: lats.length ? 11 : 2,
             center: lats.length ? {lat:lats.at(-1),lon:lons.at(-1)} : {lat:20,lon:0} },
    margin:{t:0,b:0,l:0,r:0},
    paper_bgcolor:"#0f172a", font:{color:"#e2e8f0"}
  }, { displayModeBar:false, responsive:true });
}

// ── Save → POST to Gem /log ───────────────────────────────────────────────────
async function save() {
  if (!transcript) return;
  if (lat === null) { status("⚠ No GPS fix yet"); return; }
  status("⏳ AI processing…");
  document.getElementById("btn-save").disabled = true;
  try {
    const r = await fetch("/log", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ lat, lon, text: transcript })
    });
    const feat = await r.json();
    features.push(feat);
    renderMap();
    addItem(feat);
    status("✅ Logged: " + feat.properties.title);
    transcript = "";
  } catch(e) {
    status("⚠ " + e.message);
    document.getElementById("btn-save").disabled = false;
  }
}

// ── Export GeoJSON ────────────────────────────────────────────────────────────
function exportGJ() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(
    [JSON.stringify({type:"FeatureCollection",features},null,2)],
    {type:"application/geo+json"}));
  a.download = "travel_log.geojson"; a.click();
}

// ── Log list ──────────────────────────────────────────────────────────────────
function addItem(f) {
  const p = f.properties;
  const tags = (Array.isArray(p.tags) ? p.tags : JSON.parse(p.tags || "[]"))
    .map(t => `<span class="tag">${t}</span>`).join("");
  const li = document.createElement("li");
  li.innerHTML = `<b>${p.title}</b> — ${p.note} ${tags}
    <br><span style="color:#475569">${p.timestamp}</span>`;
  document.getElementById("log").prepend(li);
}

function status(msg) { document.getElementById("status").textContent = msg; }

// ── Buttons ───────────────────────────────────────────────────────────────────
document.getElementById("btn-rec").onclick = () => {
  if (!recog) return;
  document.getElementById("btn-rec").classList.add("on");
  status("🎙 Listening…"); recog.start();
};
document.getElementById("btn-save").onclick = save;
document.getElementById("btn-export").onclick = exportGJ;

// ── Boot ──────────────────────────────────────────────────────────────────────
// Load any existing entries from server
fetch("/data").then(r=>r.json()).then(fc=>{
  features = fc.features || [];
  renderMap();
  features.forEach(addItem);
}).catch(()=>renderMap());
</script>
</body>
</html>
