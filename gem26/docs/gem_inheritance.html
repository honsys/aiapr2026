<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gem Object Inheritance Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1e1e2e; overflow: hidden; width: 100vw; height: 100vh; }
  #wrap { transform-origin: 0 0; position: absolute; }
  #wrap svg { display: block; }
</style>
</head>
<body>
<div id="wrap"></div>
<script>
  fetch('gem_mindmap-2.svg').then(r => r.text()).then(svg => {
    const wrap = document.getElementById('wrap');
    wrap.innerHTML = svg;
    const s = wrap.querySelector('svg');
    const vw = innerWidth, vh = innerHeight;
    const sw = s.viewBox.baseVal.width || s.getBoundingClientRect().width;
    const sh = s.viewBox.baseVal.height || s.getBoundingClientRect().height;
    let sc = Math.min(vw / sw, vh / sh);
    let tx = (vw - sw * sc) / 2, ty = (vh - sh * sc) / 2;
    const apply = () => wrap.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
    apply();

    document.body.addEventListener('wheel', e => {
      e.preventDefault();
      const d = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      const ns = Math.min(Math.max(sc * d, 0.05), 20);
      tx = e.clientX - (e.clientX - tx) * (ns / sc);
      ty = e.clientY - (e.clientY - ty) * (ns / sc);
      sc = ns; apply();
    }, { passive: false });

    let drag = false, ox, oy, otx, oty;
    document.body.addEventListener('mousedown', e => {
      drag = true; ox = e.clientX; oy = e.clientY; otx = tx; oty = ty;
      document.body.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
      if (!drag) return;
      tx = otx + e.clientX - ox; ty = oty + e.clientY - oy; apply();
    });
    window.addEventListener('mouseup', () => { drag = false; document.body.style.cursor = 'default'; });
  });
</script>
</body>
</html>
