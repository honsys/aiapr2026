<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earth & Solar System — Deep Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#dde;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#header{display:flex;align-items:center;gap:14px;padding:6px 14px;background:rgba(0,0,15,0.95);border-bottom:1px solid #1a2a4a;flex-shrink:0;flex-wrap:wrap}
#header h1{font-size:13px;color:#6af;letter-spacing:2px;white-space:nowrap}
#time-badge{font-size:18px;font-weight:bold;color:#fc4;min-width:140px}
#eon-badge{font-size:11px;color:#aaa}
#event-badge{font-size:11px;color:#f94;max-width:320px;font-style:italic}
#phase-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#1a2a4a;color:#8cf;border:1px solid #2a4a8a}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#controls{display:flex;align-items:center;gap:10px;padding:6px 14px;background:rgba(0,0,15,0.95);border-top:1px solid #1a2a4a;flex-shrink:0;flex-wrap:wrap}
.btn{background:#0d1a30;border:1px solid #2a4a7a;color:#9cf;padding:4px 12px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:3px;white-space:nowrap}
.btn:hover{background:#1a2a50}.btn.on{background:#1a3a7a;border-color:#4a8aff}
#tl{flex:1;min-width:120px;height:8px;background:#0a0a20;border-radius:4px;cursor:pointer;position:relative}
#tl-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#f44,#f84,#fc4,#4f8,#48f)}
#tl-thumb{position:absolute;top:-5px;width:18px;height:18px;background:#fff;border-radius:50%;transform:translateX(-50%);cursor:grab;border:2px solid #48f;transition:left 0.05s}
#speed-lbl{font-size:11px;color:#556;min-width:55px}
input[type=range]{width:70px;accent-color:#48f}
#legend{position:absolute;bottom:8px;right:8px;background:rgba(0,0,15,0.88);border:1px solid #1a2a4a;padding:7px 10px;font-size:10px;border-radius:4px;pointer-events:none}
#legend div{display:flex;align-items:center;gap:5px;margin:2px 0}
.lc{width:12px;height:8px;border-radius:2px}
#tooltip{position:absolute;background:rgba(0,0,30,0.92);border:1px solid #2a4a8a;padding:6px 10px;font-size:11px;border-radius:4px;pointer-events:none;display:none;max-width:220px;line-height:1.5}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;flex-direction:column;gap:10px;z-index:10}
#loading p{color:#48f;font-size:14px}
#lb{width:280px;height:4px;background:#0a0a20;border-radius:2px}
#lf{height:100%;background:#48f;border-radius:2px;transition:width .3s}
#ls{font-size:11px;color:#446}
</style>
</head>
<body>
<div id="header">
  <h1>🌌 DEEP TIME</h1>
  <div id="time-badge">4.6 Ga</div>
  <div><div id="eon-badge">Solar Nebula</div><div id="event-badge"></div></div>
  <div id="phase-badge">Solar System Formation</div>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="legend">
    <div><div class="lc" style="background:#f84"></div>Divergent boundary</div>
    <div><div class="lc" style="background:#fc4"></div>Convergent boundary</div>
    <div><div class="lc" style="background:#4fa"></div>Transform fault</div>
    <div><div class="lc" style="background:#48f"></div>Ocean</div>
    <div><div class="lc" style="background:#4a7a3a"></div>Land</div>
    <div><div class="lc" style="background:#faf"></div>Hotspot / LIP</div>
  </div>
  <div id="tooltip"></div>
  <div id="loading"><p>Initializing Deep Time…</p><div id="lb"><div id="lf" style="width:0%"></div></div><div id="ls">Loading…</div></div>
</div>
<div id="controls">
  <button class="btn on" id="bplay">⏸ Pause</button>
  <button class="btn" id="brev">⏮ Rev</button>
  <button class="btn" id="bsolar">☀ Solar</button>
  <button class="btn" id="bearth">🌍 Earth</button>
  <div id="tl"><div id="tl-fill"></div><div id="tl-thumb"></div></div>
  <span id="speed-lbl">5×</span>
  <input type="range" id="spd" min="1" max="30" value="5">
  <button class="btn on" id="proj-eq">Equirect</button>
  <button class="btn" id="proj-rob">Robinson</button>
  <button class="btn" id="proj-orth">Ortho</button>
</div>
<script src="data.js"></script>
<script src="solar.js"></script>
<script src="tectonic.js"></script>
<script src="main.js"></script>
</body>
</html>
