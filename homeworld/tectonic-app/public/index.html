<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Tectonic History — 4.5 Ga to Present</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0ff; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 8px 16px; background: rgba(0,0,20,0.8); border-bottom: 1px solid #223; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 14px; color: #88aaff; letter-spacing: 2px; text-transform: uppercase; }
  #time-display { font-size: 20px; font-weight: bold; color: #ffcc44; min-width: 160px; }
  #eon-display { font-size: 12px; color: #aaa; }
  #event-display { font-size: 11px; color: #ff9944; max-width: 300px; font-style: italic; }
  #canvas-container { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #controls { padding: 8px 16px; background: rgba(0,0,20,0.9); border-top: 1px solid #223; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  button { background: #1a2a4a; border: 1px solid #446; color: #aaccff; padding: 5px 14px; cursor: pointer; font-family: inherit; font-size: 12px; border-radius: 3px; }
  button:hover { background: #2a3a6a; }
  button.active { background: #2244aa; border-color: #66aaff; }
  #timeline { flex: 1; height: 6px; background: #1a1a3a; border-radius: 3px; cursor: pointer; position: relative; }
  #timeline-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff8844, #ffcc44, #44ff88, #4488ff); border-radius: 3px; transition: width 0.1s; }
  #timeline-thumb { position: absolute; top: -5px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translateX(-50%); cursor: grab; border: 2px solid #4488ff; }
  #speed-label { font-size: 11px; color: #668; min-width: 60px; }
  input[type=range] { width: 80px; accent-color: #4488ff; }
  #legend { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,20,0.85); border: 1px solid #334; padding: 8px 12px; font-size: 10px; border-radius: 4px; }
  #legend div { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .leg-color { width: 14px; height: 10px; border-radius: 2px; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a1a; font-size: 16px; color: #4488ff; flex-direction: column; gap: 12px; }
  #loading-bar { width: 300px; height: 4px; background: #1a1a3a; border-radius: 2px; }
  #loading-fill { height: 100%; background: #4488ff; border-radius: 2px; transition: width 0.3s; }
  #projection-btns { display: flex; gap: 4px; }
</style>
</head>
<body>
<div id="header">
  <h1>🌍 Earth Tectonic History</h1>
  <div id="time-display">0 Ma</div>
  <div>
    <div id="eon-display">Phanerozoic · Cenozoic</div>
    <div id="event-display"></div>
  </div>
</div>
<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div id="legend">
    <div><div class="leg-color" style="background:#3a6a3a"></div> Land</div>
    <div><div class="leg-color" style="background:#1a3a6a"></div> Ocean</div>
    <div><div class="leg-color" style="background:#ff4444"></div> Divergent boundary</div>
    <div><div class="leg-color" style="background:#ffaa00"></div> Convergent boundary</div>
    <div><div class="leg-color" style="background:#44ffaa"></div> Transform fault</div>
    <div><div class="leg-color" style="background:#ff88ff"></div> Hotspot / LIP</div>
  </div>
  <div id="loading">
    <div>Loading paleogeographic data…</div>
    <div id="loading-bar"><div id="loading-fill" style="width:0%"></div></div>
    <div id="loading-status" style="font-size:12px;color:#668">Initializing…</div>
  </div>
</div>
<div id="controls">
  <button id="btn-play" class="active">⏸ Pause</button>
  <button id="btn-rev">⏮ Reverse</button>
  <div id="timeline"><div id="timeline-fill"></div><div id="timeline-thumb"></div></div>
  <span id="speed-label">Speed: 1×</span>
  <input type="range" id="speed" min="1" max="20" value="5">
  <div id="projection-btns">
    <button id="proj-equirect" class="active">Equirect</button>
    <button id="proj-robinson">Robinson</button>
    <button id="proj-ortho">Ortho</button>
  </div>
</div>
<script src="geodata.js"></script>
<script src="renderer.js"></script>
<script src="loader.js"></script>
<script src="app.js"></script>
</body>
</html>
